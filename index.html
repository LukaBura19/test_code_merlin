<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Merlin Aplikacija</title>
    
    <style>
        /* CSS Variables for better maintainability */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --btn-bg: #f0f0f0;
            --btn-border: #ccc;
            --transition-speed: 0.3s;
            /* SCRUM-28: keyboard focus ring (WCAG-friendly contrast) */
            --focus-ring-color: #0b57d0;
            --focus-ring-width: 2px;
            --focus-ring-offset: 2px;
        }

        /* Dark mode theme scoped to data-theme attribute */
        [data-theme="dark"] {
            --bg-color: #000000;
            --text-color: #ffffff;
            --btn-bg: #333;
            --btn-border: #555;
            --focus-ring-color: #8ab4f8;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
            background-color: var(--bg-color);
            color: var(--text-color);
            position: relative;
        }

        /* SCRUM-37: skip link — off-screen until focused */
        .skip-to-main {
            position: fixed;
            top: -100vh;
            left: 8px;
            z-index: 10001;
            padding: 10px 16px;
            font-size: 16px;
            font-family: inherit;
            color: var(--text-color);
            background-color: var(--bg-color);
            border: 2px solid var(--focus-ring-color);
            border-radius: 5px;
            text-decoration: none;
            box-sizing: border-box;
        }

        .skip-to-main:focus:not(:focus-visible) {
            outline: none;
        }

        .skip-to-main:focus,
        .skip-to-main:focus-visible {
            top: 8px;
            outline: var(--focus-ring-width) solid var(--focus-ring-color);
            outline-offset: var(--focus-ring-offset);
        }

        #main:focus {
            outline: var(--focus-ring-width) solid var(--focus-ring-color);
            outline-offset: var(--focus-ring-offset);
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid var(--btn-border);
            border-radius: 5px;
            background-color: var(--btn-bg);
            color: var(--text-color);
            transition: all var(--transition-speed) ease;
        }

        button:hover {
            opacity: 0.8;
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        button:disabled:hover {
            opacity: 0.5;
            transform: none;
        }

        /* SCRUM-28: visible focus for keyboard only (:focus-visible) */
        button:focus:not(:focus-visible) {
            outline: none;
        }

        button:focus-visible {
            outline: var(--focus-ring-width) solid var(--focus-ring-color);
            outline-offset: var(--focus-ring-offset);
        }

        button:disabled:focus-visible {
            outline: none;
        }

        /* SCRUM-34: stronger keyboard focus on theme toggle (both themes via --focus-ring-color) */
        #themeToggle:focus:not(:focus-visible) {
            outline: none;
        }

        #themeToggle:focus-visible {
            outline: 3px solid var(--focus-ring-color);
            outline-offset: 3px;
        }

        #nameInput:focus:not(:focus-visible) {
            outline: none;
        }

        #nameInput:focus-visible {
            outline: var(--focus-ring-width) solid var(--focus-ring-color);
            outline-offset: var(--focus-ring-offset);
        }

        /* COD-1: clearer rings on compact icon buttons (same tokens, slightly larger offset) */
        #bannerCloseBtn:focus-visible,
        .storage-message .dismiss-btn:focus-visible {
            outline-offset: 3px;
        }

        /* COD-1: explicit primary-control mapping (inherits SCRUM-28 ring tokens) */
        #themeToggle:focus-visible,
        #themeResetBtn:focus-visible,
        #saveBtn:focus-visible {
            outline: var(--focus-ring-width) solid var(--focus-ring-color);
            outline-offset: var(--focus-ring-offset);
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .theme-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .theme-shortcut-hint {
            margin: 0;
            font-size: 12px;
            line-height: 1.35;
            opacity: 0.82;
            text-align: center;
            max-width: 280px;
        }

        .theme-shortcut-hint kbd {
            font-family: inherit;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--btn-border);
            background: var(--btn-bg);
            color: var(--text-color);
        }

        .theme-shortcut-hint {
            margin: 4px 0 0;
            font-size: 12px;
            line-height: 1.35;
            opacity: 0.82;
            text-align: center;
            max-width: 280px;
        }

        .theme-shortcut-hint kbd {
            font-family: inherit;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--btn-border);
            background: var(--btn-bg);
            color: var(--text-color);
        }

        .storage-message {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            border-radius: 5px;
            font-size: 14px;
            max-width: 400px;
        }

        .hidden {
            display: none;
        }

        .storage-message.hidden {
            display: none;
        }

        .content-area {
            width: 100%;
            max-width: 400px;
            min-height: 5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .content-empty-state {
            text-align: center;
            padding: 8px 12px;
        }

        .content-empty-state__title {
            margin: 0 0 6px;
            font-size: 15px;
            font-weight: normal;
            opacity: 0.85;
        }

        .content-empty-state__hint {
            margin: 0;
            font-size: 13px;
            opacity: 0.6;
        }

        .storage-message .dismiss-btn {
            margin-left: auto;
            padding: 2px 8px;
            font-size: 18px;
            line-height: 1;
            min-width: auto;
        }

        .form-group {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        #nameInput {
            padding: 8px;
            font-size: 16px;
            margin-top: 4px;
        }

        .char-counter {
            margin-top: 4px;
            font-size: 12px;
            color: var(--text-color);
        }

        .char-counter.warning {
            color: #d9534f;
        }

        @keyframes greetingFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #greeting.greeting-fade-in {
            animation: greetingFadeIn 0.3s ease forwards;
        }

        /* COD-6: no greeting fade-in when user prefers reduced motion */
        @media (prefers-reduced-motion: reduce) {
            #greeting.greeting-fade-in {
                animation: none;
            }
        }
    </style>

    <!-- Critical: Theme initialization in HEAD to prevent Flash of Unstyled Content (FOUC) -->
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('theme');
                const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                
                if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                }
            } catch (e) {
                console.error("Theme initialization failed", e);
            }
        })();
    </script>
</head>
<body>

    <a href="#main" class="skip-to-main">Preskoči na glavni sadržaj</a>

    <div id="banner" class="banner" role="banner">
        <span>Dobrodošli! Koristite aplikaciju slobodno.</span>
        <button id="bannerCloseBtn" type="button" class="banner-close-btn" aria-label="Zatvori banner">×</button>
    </div>

    <main id="main" tabindex="-1">
    <div class="container">
        <h1>Dobrodošli na Code Merlin aplikaciju</h1>
        
        <!-- SCRUM-27: theme reset clears saved preference and follows system default (see work item for AC). -->
        <div class="theme-controls" role="group" aria-label="Kontrole teme">
            <button id="themeToggle" type="button" aria-keyshortcuts="Control+Shift+T"></button>
            <button id="themeResetBtn" type="button" class="theme-reset-btn"
                aria-label="Vrati podrazumevanu temu"
                title="Vrati podrazumevanu temu (prati sistemsko podešavanje)">Vrati temu</button>
        </div>
        <p id="themeShortcutHint" class="theme-shortcut-hint">
            Prečica: <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>T</kbd>
        </p>

        <div id="storageMessage" class="storage-message hidden" role="status">
            <span>Ne možemo da sačuvamo temu na ovom uređaju, ali promena važi dok je stranica otvorena.</span>
            <button type="button" class="dismiss-btn" aria-label="Zatvori">×</button>
        </div>
        <div class="form-group">
            <label for="nameInput">Ime</label>
            <input id="nameInput" type="text" maxlength="20" />
            <span id="nameError" class="name-error" aria-live="polite"></span>
            <span id="nameCounter" class="char-counter"></span>
            <button id="saveBtn" type="button" disabled>Sačuvaj</button>
            <p id="saveSuccessMessage" class="save-success-message hidden" role="status" aria-live="polite"></p>
        </div>
        <div id="contentArea" class="content-area">
            <div id="contentEmptyState" class="content-empty-state" role="status">
                <p class="content-empty-state__title">No data yet</p>
                <p class="content-empty-state__hint">Save your name to see a greeting.</p>
            </div>
            <p id="greeting" class="hidden" aria-live="polite"></p>
        </div>
    </div>
    </main>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const themeResetBtn = document.getElementById('themeResetBtn');
        const storageMessage = document.getElementById('storageMessage');
        const dismissBtn = storageMessage.querySelector('.dismiss-btn');
        const STORAGE_MESSAGE_DISMISSED_KEY = 'storageMessageDismissed';

        const nameInput = document.getElementById('nameInput');
        const nameCounter = document.getElementById('nameCounter');
        const nameError = document.getElementById('nameError');
        const saveBtn = document.getElementById('saveBtn');
        const saveSuccessMessage = document.getElementById('saveSuccessMessage');
        const greeting = document.getElementById('greeting');
        const contentEmptyState = document.getElementById('contentEmptyState');
        const banner = document.getElementById('banner');
        const bannerCloseBtn = document.getElementById('bannerCloseBtn');

        const storage = {
            get: (key) => {
                try {
                    const v = localStorage.getItem(key);
                    return v ?? null;
                } catch (e) {
                    console.warn("Could not read from localStorage", key, e);
                    return null;
                }
            },
            set: (key, value) => {
                try {
                    localStorage.setItem(key, value);
                    return true;
                } catch (e) {
                    console.warn("Could not save theme to localStorage", e);
                    return false;
                }
            },
            remove: (key) => {
                try {
                    localStorage.removeItem(key);
                    return true;
                } catch (e) {
                    console.warn("Could not remove from localStorage", key, e);
                    return false;
                }
            }
        };

        const isStorageMessageDismissed = () => storage.get(STORAGE_MESSAGE_DISMISSED_KEY) === 'true';

        const showStorageMessage = () => {
            if (isStorageMessageDismissed()) {
                hideStorageMessage();
                return;
            }
            storageMessage.classList.remove('hidden');
        };

        const hideStorageMessage = () => {
            storageMessage.classList.add('hidden');
        };

        dismissBtn.addEventListener('click', () => {
            hideStorageMessage();
            storage.set(STORAGE_MESSAGE_DISMISSED_KEY, 'true');
        });

        let successMessageTimeout = null;
        const NAME_MAX_LENGTH = 20;
        /** UI copy grouped for localization (COD-7 follow-up). */
        const UI_COPY = {
            nameCounterSuffix: 'karaktera',
        };
        const GREETING_USE_SAVE_ANIMATION = true;

        const isValidNameLength = (len) => len >= 1 && len <= NAME_MAX_LENGTH;

        const clearNameError = () => {
            if (nameError) nameError.textContent = '';
            if (nameInput) nameInput.removeAttribute('aria-invalid');
        };

        const showNameError = (msg) => {
            if (nameError) {
                nameError.textContent = msg;
                if (nameInput) nameInput.setAttribute('aria-invalid', 'true');
            }
        };

        const updateSaveButtonState = () => {
            if (!saveBtn) return;
            const len = nameInput ? nameInput.value.length : 0;
            saveBtn.disabled = !isValidNameLength(len);
        };

        const updateNameCounter = () => {
            if (!nameInput || !nameCounter) return;

            const length = nameInput.value.length;
            nameCounter.textContent = `${length}/${NAME_MAX_LENGTH} ${UI_COPY.nameCounterSuffix}`;

            if (length >= 18 && length <= NAME_MAX_LENGTH) {
                nameCounter.classList.add('warning');
            } else {
                nameCounter.classList.remove('warning');
            }
            updateSaveButtonState();
        };

        const displayGreeting = (name, animate = false) => {
            if (!greeting) return;
            const trimmed = name ? String(name).trim() : '';
            const hasContent = Boolean(trimmed);
            greeting.textContent = hasContent ? `Dobrodošli, ${trimmed}!` : '';
            if (hasContent) {
                greeting.classList.remove('hidden');
                if (contentEmptyState) contentEmptyState.classList.add('hidden');
            } else {
                greeting.classList.add('hidden');
                if (contentEmptyState) contentEmptyState.classList.remove('hidden');
            }
            if (animate && hasContent) {
                greeting.classList.remove('greeting-fade-in');
                let reducedMotion = false;
                try {
                    reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
                } catch (e) {
                    reducedMotion = false;
                }
                if (!reducedMotion) {
                    void greeting.offsetWidth; /* force reflow to retrigger animation */
                    greeting.classList.add('greeting-fade-in');
                    greeting.addEventListener('animationend', () => greeting.classList.remove('greeting-fade-in'), { once: true });
                }
            }
        };

        const hideSaveSuccessMessage = () => {
            if (successMessageTimeout) {
                clearTimeout(successMessageTimeout);
                successMessageTimeout = null;
            }
            if (saveSuccessMessage) {
                saveSuccessMessage.classList.add('hidden');
                saveSuccessMessage.textContent = '';
            }
        };

        const showSaveSuccessMessage = () => {
            hideSaveSuccessMessage();
            if (!saveSuccessMessage) return;
            saveSuccessMessage.textContent = 'Ime je uspešno sačuvano.';
            saveSuccessMessage.classList.remove('hidden');
            successMessageTimeout = setTimeout(hideSaveSuccessMessage, 4000);
        };

        const formatName = (str) => {
            if (!str) return '';
            return str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
        };

        const performSave = () => {
            hideSaveSuccessMessage();
            const raw = nameInput?.value?.trim() || '';
            const name = formatName(raw);
            if (!name) {
                showNameError('Ime ne može biti prazno.');
                return;
            }
            if (!isValidNameLength(name.length)) {
                showNameError('Ime mora imati 1–20 karaktera.');
                return;
            }
            clearNameError();
            localStorage.setItem('userName', name);
            if (nameInput) nameInput.value = name;
            updateNameCounter();
            displayGreeting(name, true);
            showSaveSuccessMessage();
        };

        const clearInputAndError = () => {
            hideSaveSuccessMessage();
            if (nameInput) nameInput.value = '';
            clearNameError();
            updateNameCounter();
        };

        const closeBanner = () => {
            if (banner) banner.classList.add('hidden');
            try { localStorage.setItem('bannerDismissed', 'true'); } catch (e) {}
        };

        updateNameCounter();
        const savedName = localStorage.getItem('userName');
        displayGreeting(savedName || '', false);
        updateSaveButtonState();

        if (localStorage.getItem('bannerDismissed') === 'true' && banner) {
            banner.classList.add('hidden');
        }
        if (isStorageMessageDismissed()) {
            hideStorageMessage();
        }
        if (bannerCloseBtn) {
            bannerCloseBtn.addEventListener('click', closeBanner);
            bannerCloseBtn.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar') {
                    e.preventDefault();
                    closeBanner();
                }
            });
        }

        const getThemeToggleLabel = (theme) =>
            theme === 'dark' ? 'Prebaci na svetlu temu' : 'Prebaci na tamnu temu';

        const updateThemeToggle = (theme) => {
            const label = getThemeToggleLabel(theme);
            themeToggle.setAttribute('aria-label', label);
            themeToggle.setAttribute('title', label);
            themeToggle.setAttribute('aria-pressed', String(theme === 'dark'));
            themeToggle.textContent = label;
        };

        const applyDocumentTheme = (theme) => {
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
        };

        /**
         * Applies theme to `<html>` and syncs toggle labels.
         * @param {boolean} persist When true, calls storage.set('theme', theme); shows storage banner if save fails.
         */
        const setTheme = (theme, persist) => {
            applyDocumentTheme(theme);
            updateThemeToggle(theme);
            if (persist) {
                const saved = storage.set('theme', theme);
                if (!saved) {
                    showStorageMessage();
                }
            }
        };

        const initialTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
        updateThemeToggle(initialTheme);

        const resetTheme = () => {
            storage.remove('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            setTheme(systemPrefersDark ? 'dark' : 'light', false);
        };

        /** Delegates to setTheme(..., true) so persistence always routes through storage.set. */
        const toggleTheme = () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            setTheme(newTheme, true);
        };

        const isTypingInTextEntry = () => {
            const el = document.activeElement;
            if (!el || el === document.body) return false;
            const tag = el.tagName;
            if (tag === 'TEXTAREA') return true;
            if (tag === 'SELECT') return true;
            if (el.isContentEditable) return true;
            if (tag === 'INPUT') {
                const type = (el.type || 'text').toLowerCase();
                return ['text', 'password', 'email', 'search', 'url', 'tel', 'number'].includes(type);
            }
            return false;
        };

        themeToggle.addEventListener('click', toggleTheme);
        themeResetBtn.addEventListener('click', resetTheme);
        themeResetBtn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar') {
                e.preventDefault();
                resetTheme();
            }
        });

        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 't') {
                e.preventDefault();
                toggleTheme();
                return;
            }
            if (e.key.toLowerCase() !== 't') return;
            if (e.ctrlKey || e.metaKey || e.altKey) return;
            if (isTypingInTextEntry()) return;
            e.preventDefault();
            toggleTheme();
        });

        if (nameInput) {
            nameInput.addEventListener('input', updateNameCounter);
            nameInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    performSave();
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    clearInputAndError();
                }
            });
        }

        if (saveBtn) {
            saveBtn.addEventListener('click', () => {
                performSave();
            });
        }

        if (nameInput) {
            nameInput.focus();
        }
    </script>

</body>
</html>
