<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Merlin Aplikacija</title>
    
    <style>
        /* CSS Variables for better maintainability */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --btn-bg: #f0f0f0;
            --btn-border: #ccc;
            --transition-speed: 0.3s;
        }

        /* Dark mode theme scoped to data-theme attribute */
        [data-theme="dark"] {
            --bg-color: #000000;
            --text-color: #ffffff;
            --btn-bg: #333;
            --btn-border: #555;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid var(--btn-border);
            border-radius: 5px;
            background-color: var(--btn-bg);
            color: var(--text-color);
            transition: all var(--transition-speed) ease;
        }

        button:hover {
            opacity: 0.8;
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        button:disabled:hover {
            opacity: 0.5;
            transform: none;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .storage-message {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            border-radius: 5px;
            font-size: 14px;
            max-width: 400px;
        }

        .storage-message.hidden {
            display: none;
        }

        .storage-message .dismiss-btn {
            margin-left: auto;
            padding: 2px 8px;
            font-size: 18px;
            line-height: 1;
            min-width: auto;
        }

        .form-group {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        #nameInput {
            padding: 8px;
            font-size: 16px;
            margin-top: 4px;
        }

        .char-counter {
            margin-top: 4px;
            font-size: 12px;
            color: var(--text-color);
        }

        .char-counter.warning {
            color: #d9534f;
        }

        .name-error {
            color: #d9534f;
            font-size: 12px;
            margin-top: 4px;
            min-height: 18px;
        }

        .save-success-message {
            font-size: 14px;
            color: #28a745;
            margin-top: 8px;
            min-height: 20px;
        }

        .save-success-message.hidden {
            display: none;
        }

        .banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px 16px;
            background: var(--btn-bg);
            border-bottom: 1px solid var(--btn-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .banner.hidden {
            display: none;
        }

        .banner-close-btn {
            padding: 4px 10px;
            min-width: auto;
        }
    </style>

    <!-- Critical: Theme initialization in HEAD to prevent Flash of Unstyled Content (FOUC) -->
    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('theme');
                const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                
                if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                }
            } catch (e) {
                console.error("Theme initialization failed", e);
            }
        })();
    </script>
</head>
<body>

    <div id="banner" class="banner" role="banner">
        <span>Dobrodošli! Koristite aplikaciju slobodno.</span>
        <button id="bannerCloseBtn" type="button" class="banner-close-btn" aria-label="Zatvori banner">×</button>
    </div>

    <div class="container">
        <h1>Dobrodošli na Code Merlin aplikaciju</h1>
        
        <button id="themeToggle"></button>

        <div id="storageMessage" class="storage-message hidden" role="status">
            <span>Ne možemo da sačuvamo temu na ovom uređaju, ali promena važi dok je stranica otvorena.</span>
            <button type="button" class="dismiss-btn" aria-label="Zatvori">×</button>
        </div>
        <div class="form-group">
            <label for="nameInput">Ime</label>
            <input id="nameInput" type="text" maxlength="20" />
            <span id="nameError" class="name-error" aria-live="polite"></span>
            <span id="nameCounter" class="char-counter">0/20 characters</span>
            <button id="saveBtn" type="button" disabled>Sačuvaj</button>
            <p id="saveSuccessMessage" class="save-success-message hidden" role="status" aria-live="polite"></p>
        </div>
        <p id="greeting" aria-live="polite"></p>
    </div>

    <script>
        const button = document.getElementById('themeToggle');
        const storageMessage = document.getElementById('storageMessage');
        const dismissBtn = storageMessage.querySelector('.dismiss-btn');

        const storage = {
            set: (key, value) => {
                try {
                    localStorage.setItem(key, value);
                    return true;
                } catch (e) {
                    console.warn("Could not save theme to localStorage", e);
                    return false;
                }
            }
        };

        const showStorageMessage = () => {
            storageMessage.classList.remove('hidden');
        };

        const hideStorageMessage = () => {
            storageMessage.classList.add('hidden');
        };

        dismissBtn.addEventListener('click', hideStorageMessage);

        const nameInput = document.getElementById('nameInput');
        const nameCounter = document.getElementById('nameCounter');
        const nameError = document.getElementById('nameError');
        const saveBtn = document.getElementById('saveBtn');
        const saveSuccessMessage = document.getElementById('saveSuccessMessage');
        const greeting = document.getElementById('greeting');
        let successMessageTimeout = null;
        const banner = document.getElementById('banner');
        const bannerCloseBtn = document.getElementById('bannerCloseBtn');
        const NAME_MAX_LENGTH = 20;

        const isValidNameLength = (len) => len >= 1 && len <= NAME_MAX_LENGTH;

        const clearNameError = () => {
            if (nameError) nameError.textContent = '';
            if (nameInput) nameInput.removeAttribute('aria-invalid');
        };

        const showNameError = (msg) => {
            if (nameError) {
                nameError.textContent = msg;
                if (nameInput) nameInput.setAttribute('aria-invalid', 'true');
            }
        };

        const updateSaveButtonState = () => {
            if (!saveBtn) return;
            const len = nameInput ? nameInput.value.length : 0;
            saveBtn.disabled = !isValidNameLength(len);
        };

        const updateNameCounter = () => {
            if (!nameInput || !nameCounter) return;

            const length = nameInput.value.length;
            nameCounter.textContent = `${length}/${NAME_MAX_LENGTH} characters`;

            if (length >= 18 && length <= NAME_MAX_LENGTH) {
                nameCounter.classList.add('warning');
            } else {
                nameCounter.classList.remove('warning');
            }
            updateSaveButtonState();
        };

        const displayGreeting = (name) => {
            if (!greeting) return;
            greeting.textContent = name ? `Dobrodošli, ${name}!` : '';
        };

        const hideSaveSuccessMessage = () => {
            if (successMessageTimeout) {
                clearTimeout(successMessageTimeout);
                successMessageTimeout = null;
            }
            if (saveSuccessMessage) {
                saveSuccessMessage.classList.add('hidden');
                saveSuccessMessage.textContent = '';
            }
        };

        const showSaveSuccessMessage = () => {
            hideSaveSuccessMessage();
            if (!saveSuccessMessage) return;
            saveSuccessMessage.textContent = 'Name has been saved successfully.';
            saveSuccessMessage.classList.remove('hidden');
            successMessageTimeout = setTimeout(hideSaveSuccessMessage, 4000);
        };

        const performSave = () => {
            hideSaveSuccessMessage();
            const name = nameInput?.value?.trim() || '';
            if (!isValidNameLength(name.length)) {
                showNameError(name.length === 0 ? 'Ime je obavezno (1–20 karaktera).' : 'Ime mora imati 1–20 karaktera.');
                return;
            }
            clearNameError();
            localStorage.setItem('userName', name);
            displayGreeting(name);
            showSaveSuccessMessage();
        };

        const clearInputAndError = () => {
            hideSaveSuccessMessage();
            if (nameInput) nameInput.value = '';
            clearNameError();
            updateNameCounter();
        };

        const closeBanner = () => {
            if (banner) banner.classList.add('hidden');
            try { localStorage.setItem('bannerDismissed', 'true'); } catch (e) {}
        };

        updateNameCounter();
        const savedName = localStorage.getItem('userName');
        if (savedName) {
            displayGreeting(savedName);
        }
        updateSaveButtonState();

        if (localStorage.getItem('bannerDismissed') === 'true' && banner) {
            banner.classList.add('hidden');
        }

        const updateAriaLabel = (theme) => {
            const label = theme === 'dark' ? 'Prebaci na svetlu temu' : 'Prebaci na tamnu temu';
            button.setAttribute('aria-label', label);
            button.textContent = label;
        };

        const initialTheme = document.documentElement.getAttribute('data-theme') || 'light';
        updateThemeToggleButton(initialTheme);

        button.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';

            if (newTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }

            updateThemeToggleButton(newTheme);

            const saved = storage.set('theme', newTheme);
            if (!saved) {
                showStorageMessage();
            }
        });

        if (nameInput) {
            nameInput.addEventListener('input', updateNameCounter);
            nameInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    performSave();
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    clearInputAndError();
                }
            });
        }

        if (saveBtn) {
            saveBtn.addEventListener('click', performSave);
        }

        if (bannerCloseBtn) {
            bannerCloseBtn.addEventListener('click', closeBanner);
            bannerCloseBtn.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    closeBanner();
                }
            });
        }
    </script>

</body>
</html>
